name: Alex Prompts Email Draft

# Emails the weekly script draft that the Saturday cloud routine pushes under
# drafts/ on the `drafts` branch. The routine cannot reach Gmail directly (its
# connector list only exposes Google Drive), so it commits the draft here and
# this job sends it via Resend, reusing the secrets from the (now-disabled)
# Monday digest. See scripts/ai_news/routine/orchestrator.md STEP 6.

on:
  push:
    branches: [drafts]
    paths: ['drafts/**']
  workflow_dispatch: # manual re-send from the GitHub UI (acts on the drafts branch)

jobs:
  email:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout the drafts branch
        uses: actions/checkout@v4
        with:
          ref: drafts

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements-ai-news.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-ai-news.txt

      - name: Email the newest draft
        working-directory: scripts
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          # Must be on a Resend-verified domain (rebbadvisors.com for now), or the
          # send only reaches the Resend account address, not Alex's Gmail.
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
        run: |
          latest=$(ls -t ../drafts/*.md 2>/dev/null | head -1)
          if [ -z "$latest" ]; then
            echo "No draft markdown under drafts/; nothing to email."
            exit 0
          fi
          echo "Emailing $latest"
          python -m ai_news.digest --email-file "$latest"
