name: Daily Audit Packet

# One-per-day "go print this" trigger. Refreshes the top-N packets in
# Supabase Storage so /dashboard/prospects always has live links to render
# packets, then emails the highest-severity row that hasn't been printed
# yet to NOTIFICATION_EMAIL. The user prints the email's attachment, drops
# it in a #10 envelope, mails it.
#
# Why a separate workflow from weekly-prospects.yml: prospects is the slow
# audit-and-discover loop (Playwright + PageSpeed, ~30s/row, 50 rows).
# Packets are pure rendering on already-audited rows — fast, runs daily,
# no Playwright needed.

on:
  schedule:
    # 7:00 AM EST (UTC-5) = 12:00 UTC.
    # Shifts to 8:00 AM during EDT. Adjust to '0 11 * * *' if 7am EDT matters.
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      top:
        description: 'How many packets to refresh (default 50)'
        required: false
        default: '50'

jobs:
  packet:
    runs-on: ubuntu-latest
    # Pure rendering on already-audited rows — should finish in <2 min for
    # top 50; generous timeout in case Storage uploads stall.
    timeout-minutes: 15
    env:
      PYTHONUNBUFFERED: "1"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements-scraper.txt

      - name: Install Python dependencies
        # We only need supabase + requests + python-dotenv from this file;
        # the rest (playwright, pytesseract) costs build time but stays unused.
        # Reusing the file keeps the lock surface small.
        run: pip install supabase>=2.15.0 python-dotenv requests

      - name: Refresh top-N packets in Storage and email today's print job
        working-directory: scripts
        # --upload re-renders and re-uploads the top-N highest-severity dental
        # rows so the dashboard always has fresh links. --email then picks the
        # highest-severity row in the queue (packet_html_url present,
        # packet_emailed_at NULL) and sends it. --no-revalidate trusts the DB
        # row instead of re-probing each site over HTTP — that's the audit
        # pipeline's job, not this one.
        run: |
          python -u -m prospects.audit_packet \
            --top ${{ github.event.inputs.top || '50' }} \
            --upload \
            --email \
            --no-revalidate
