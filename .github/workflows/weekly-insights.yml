name: Weekly Market Insights

on:
  schedule:
    # Monday 8:00 AM EST (UTC-5) = 13:00 UTC
    # Note: shifts to 9:00 AM during EDT (Mar–Nov). Adjust to 0 12 * * 1 if you prefer 8am EDT.
    - cron: '0 13 * * 1'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  generate-insights:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need write access to commit the updated topic index
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements-insights.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-insights.txt

      - name: Generate weekly article draft
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          PUBLISH_SECRET: ${{ secrets.PUBLISH_SECRET }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: python weekly_insights.py

      # No commit step needed — topic is generated dynamically via Gemini each run.
      # last_topic_index.txt is no longer used.
