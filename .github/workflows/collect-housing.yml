name: Greenville Residential Pulse

# Refreshes the Greenville, SC residential market pulse (Zillow ZHVI home values
# + ZORI rents, metro vs national) that feeds the Upstate Brief's residential
# section. Pulls the free public Zillow Research CSVs and commits the lean dataset
# JSON. Zillow updates monthly (~3-week lag), so most weekly runs are no-ops; the
# commit step simply skips when nothing changed. No secrets, no paid API.
# Sibling to collect-commercial.yml. See scripts/greenville/housing.py.

on:
  schedule:
    # Weekly, Sunday 22:00 UTC, same slot as the commercial refresh, so both
    # datasets are fresh before the Monday ~08:00 UTC Upstate Brief drafts. GitHub
    # cron fires late in practice; Sunday evening leaves a wide margin.
    - cron: '0 22 * * 0'
  workflow_dispatch: # manual trigger from the GitHub UI

permissions:
  contents: write # needed to push the refreshed dataset back to the repo

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements-ai-news.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-ai-news.txt

      - name: Collect Greenville residential pulse
        working-directory: scripts
        run: |
          python -m greenville.housing \
            --json-out ../src/data/greenvilleHousing.json

      - name: Commit the refreshed dataset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/greenvilleHousing.json
          if git diff --cached --quiet; then
            echo "No housing change; nothing to commit."
          else
            git commit -m "chore(greenville): refresh residential pulse [skip ci]"
            git push
          fi
