name: Greenville Commercial Sales

# Refreshes the Greenville County commercial "buyer's list" that powers the
# /tools/buyers-list page. Pulls recent commercial sales straight from the
# county's public ArcGIS service and commits the dataset JSON. The site reads the
# committed file at build time (the page is statically generated), so a refresh
# here plus the resulting push redeploys the page with new data. No secrets, no
# paid API. See scripts/greenville/CLAUDE.md.

on:
  schedule:
    # Weekly, Sunday 22:00 UTC. Nominally this ran Monday 07:00 UTC, but GitHub
    # schedules fire hours late in practice, which meant the Monday-08:00-UTC
    # Upstate Brief kept reading the PREVIOUS week's dataset. Sunday evening
    # leaves a wide margin so even a delayed run lands before the brief drafts.
    - cron: '0 22 * * 0'
  workflow_dispatch: # manual trigger from the GitHub UI

permissions:
  contents: write # needed to push the refreshed dataset back to the repo

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements-ai-news.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-ai-news.txt

      - name: Collect Greenville commercial sales
        working-directory: scripts
        run: |
          python -m greenville.commercial \
            --min-price 1000000 \
            --months 24 \
            --json-out ../src/data/commercialSales.json

      - name: Commit the refreshed dataset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/commercialSales.json
          if git diff --cached --quiet; then
            echo "No sales change; nothing to commit."
          else
            git commit -m "chore(greenville): refresh commercial buyer's list [skip ci]"
            git push
          fi
