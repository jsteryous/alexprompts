name: Alex Prompts Weekly Digest

on:
  schedule:
    # Monday 8:00 AM EST (13:00 UTC). Shifts to 9am during EDT; adjust if you care.
    - cron: '0 13 * * 1'
  workflow_dispatch: # manual trigger from the GitHub UI

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements-ai-news.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-ai-news.txt

      - name: Build + email the weekly draft
        working-directory: scripts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          # Must be an address on a Resend-verified domain (rebbadvisors.com for now).
          # Without it the run sends from onboarding@resend.dev, which only reaches
          # the Resend account email (alex@rebbadvisors.com), not your Gmail.
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
        run: python -m ai_news.digest --email
