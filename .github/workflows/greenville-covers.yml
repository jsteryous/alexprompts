name: Greenville Cover Library

# Grows the curated Greenville cover library that the /real-estate evergreen
# engine uses for lead images. Searches Wikimedia Commons for new freely-licensed,
# landscape, high-resolution Greenville photos, commits the best candidates into
# public/greenville/library/, and updates src/lib/greenvilleCovers.json +
# CREDITS.md. It opens a PR rather than pushing to main, so a human eyeballs (and
# is the real quality gate for) every addition before it goes live.
#
# FREE BY DEFAULT: runs with --no-vision, so it needs NO API key and costs nothing
# (keeping the site's zero-billing guarantee). The candidates are filtered by
# license, orientation, and resolution; the human PR review catches watermarks and
# duds. OPTIONAL sharper pre-filter: set the ANTHROPIC_API_KEY repo secret and drop
# --no-vision to have a cheap Claude Haiku vision call score each candidate first
# (that path is metered API usage, ~a few cents per run — off by default on purpose).
#
# See scripts/greenville/cover_ingest.py and scripts/greenville/CLAUDE.md.

on:
  schedule:
    # Monthly, the 3rd at 08:00 UTC. Commons' Greenville depth is finite, so a
    # run proposes a few good photos at most — monthly is plenty.
    - cron: '0 8 3 * *'
  workflow_dispatch:
    inputs:
      max_new:
        description: 'Max photos to add this run'
        required: false
        default: '3'

permissions:
  contents: write # create the branch
  pull-requests: write # open the PR

jobs:
  grow:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements-ai-news.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-ai-news.txt

      - name: Propose new covers (free, human-reviewed in the PR)
        working-directory: scripts
        run: |
          python -m greenville.cover_ingest --no-vision \
            --max-new "${{ github.event.inputs.max_new || '3' }}"

      - name: Open a pull request with the proposed covers
        uses: peter-evans/create-pull-request@v6
        with:
          branch: greenville-covers/auto
          commit-message: 'feat(greenville): add covers to the library'
          title: 'Greenville covers: new candidate photos'
          body: |
            Automated by `.github/workflows/greenville-covers.yml`.

            New freely-licensed, landscape, high-resolution Wikimedia Commons
            photos for the cover library. **You are the quality gate**: open each
            image in `public/greenville/library/`, drop any with a watermark,
            overlaid text, or that just look bad, confirm the attribution in
            `CREDITS.md`, and merge what's left. Close the PR if none are good.
          add-paths: |
            public/greenville/library/**
            src/lib/greenvilleCovers.json
