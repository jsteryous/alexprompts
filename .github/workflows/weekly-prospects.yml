name: Weekly Website Prospects Pipeline

on:
  schedule:
    # Mondays 9:00 AM EST (UTC-5) = 14:00 UTC
    # Shifts to 10:00 AM during EDT. Adjust to '0 13 * * 1' if 9am EDT matters more.
    - cron: '0 14 * * 1'
  workflow_dispatch: # manual trigger

jobs:
  prospects:
    runs-on: ubuntu-latest
    # Discover is fast; audit is slow (~15-30s per prospect × limit 50) → generous timeout.
    timeout-minutes: 60
    env:
      PYTHONUNBUFFERED: "1"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
      GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
      GOOGLE_PAGESPEED_API_KEY: ${{ secrets.GOOGLE_PAGESPEED_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements-scraper.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements-scraper.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Step 1 — Discover new prospects (all verticals × counties)
        working-directory: scripts
        run: python -u -m prospects.run_prospects --discover --all

      - name: Step 2 — Audit pending prospects
        working-directory: scripts
        # limit 50 keeps runtime bounded; leftovers roll into next week's run.
        run: python -u -m prospects.run_prospects --audit-pending --limit 50

      - name: Step 3 — Re-audit stale prospects (>30 days)
        working-directory: scripts
        run: python -u -m prospects.run_prospects --re-audit --days 30 --limit 20

      - name: Step 4 — Email digest of new HOT/WARM prospects
        working-directory: scripts
        run: python -u -m prospects.digest
