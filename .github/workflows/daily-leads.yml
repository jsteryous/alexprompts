name: Daily Leads Pipeline

on:
  schedule:
    # 4:00 AM EST (UTC-5) = 09:00 UTC
    # Note: shifts to 5:00 AM during EDT (Mar–Nov). Adjust to 0 8 * * * for 4am EDT.
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  pipeline:
    runs-on: ubuntu-latest
    # CountyWeb navigation + OCR can be slow — generous timeout
    timeout-minutes: 60
    env:
      PYTHONUNBUFFERED: "1"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
      ROD_PASSWORD: ${{ secrets.ROD_PASSWORD }}
      ROD_VIEWER_USERNAME: ${{ secrets.ROD_VIEWER_USERNAME }}
      PDL_API_KEY: ${{ secrets.PDL_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements-scraper.txt

      - name: Install Tesseract OCR (system)
        run: sudo apt-get install -y tesseract-ocr

      - name: Install Python dependencies
        run: pip install -r scripts/requirements-scraper.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Step 1 — Mortgage scraper (CountyWeb MTG/CON)
        working-directory: scripts
        run: python -u gvl_monitor.py --mode mortgages

      - name: Step 2 — Lead enrichment (LLC → human)
        working-directory: scripts
        run: python -u enrich.py --run-pending

      - name: Step 3 — Retry stuck pending leads
        working-directory: scripts
        run: python -u enrich.py --retry-pending

      - name: Step 4 — Fill missing contact info (PDL)
        working-directory: scripts
        run: python -u enrich.py --run-contact

      - name: Step 5 — High-confidence alert email
        working-directory: scripts
        # --no-deeds --no-mortgages --no-enrich = alert-only mode
        run: python -u run_daily.py --no-deeds --no-mortgages --no-enrich
