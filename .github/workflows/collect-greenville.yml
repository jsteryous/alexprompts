name: Greenville RE Signal Collector

# Collects the week's Greenville, SC real-estate signal from a NON-BLOCKED IP and
# commits it to the repo, so the cloud "Greenville Real Estate" routine can read it
# instead of fetching live. The cloud sandbox IP is blocked (HTTP 403) by Google
# News; GitHub-hosted runners are not. See scripts/greenville/CLAUDE.md and
# scripts/greenville/routine/orchestrator.md STEP 0.

on:
  schedule:
    # Friday 08:00 UTC (4am EDT / 3am EST). Run BEFORE you schedule the routine so
    # its STEP 0 reads fresh signal, with the weekend free for filming/posting.
    - cron: '0 8 * * 5'
  workflow_dispatch: # manual trigger from the GitHub UI

permissions:
  contents: write # needed to push the refreshed signal back to the repo

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements-ai-news.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-ai-news.txt

      - name: Collect the week's Greenville signal
        working-directory: scripts
        run: |
          mkdir -p greenville/data
          python -m greenville.collect \
            --json-out greenville/data/signal-latest.json \
            > greenville/data/signal-latest.txt

      - name: Commit the refreshed signal
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/greenville/data/signal-latest.json scripts/greenville/data/signal-latest.txt
          if git diff --cached --quiet; then
            echo "No signal change; nothing to commit."
          else
            # [skip ci] so this push does not re-trigger Actions.
            git commit -m "chore(greenville): refresh weekly RE signal [skip ci]"
            git push
          fi
