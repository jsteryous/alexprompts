name: Greenville RE Signal Collector

# RETIRED (July 2026). This collected the week's Greenville, SC real-estate NEWS
# signal (Google News RSS) for the old both-sides news track. That track was retired:
# the live evergreen engine is self-sourcing and NOTHING reads signal-latest.json
# anymore. The daily schedule was removed so it stops pushing noise commits (and
# emailing GitHub infra failures) for a feed nobody consumes. Kept as a manual
# workflow_dispatch only, so reviving the news track stays a one-click option. See
# scripts/greenville/CLAUDE.md and scripts/greenville/routine/orchestrator.md.

on:
  workflow_dispatch: # manual only; the daily schedule was retired with the news track

permissions:
  contents: write # needed to push the refreshed signal back to the repo

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements-ai-news.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-ai-news.txt

      - name: Collect the week's Greenville signal
        working-directory: scripts
        run: |
          mkdir -p greenville/data
          python -m greenville.collect \
            --json-out greenville/data/signal-latest.json \
            > greenville/data/signal-latest.txt

      - name: Commit the refreshed signal
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/greenville/data/signal-latest.json scripts/greenville/data/signal-latest.txt
          if git diff --cached --quiet; then
            echo "No signal change; nothing to commit."
          else
            # [skip ci] so this push does not re-trigger Actions.
            git commit -m "chore(greenville): refresh weekly RE signal [skip ci]"
            git push
          fi
