name: Alex Prompts Signal Collector

# Collects the week's scored signal from a NON-BLOCKED IP and commits it to the
# repo, so the Saturday cloud script routine can read it instead of fetching live.
# The cloud sandbox IP is blocked (HTTP 403) by Google News, Hacker News, and
# Reddit; GitHub-hosted runners are not. See scripts/CLAUDE.md ("CI -> cloud
# routine signal hand-off") and scripts/ai_news/routine/orchestrator.md STEP 0.

on:
  schedule:
    # Saturday 08:00 UTC (4am EDT / 3am EST), one hour ahead of the cloud script
    # routine at 09:00 UTC, so the script is delivered before Alex wakes (~6am ET).
    # Keep this BEFORE the routine so STEP 0 reads fresh signal.
    - cron: '0 5 * * 6'
  workflow_dispatch: # manual trigger from the GitHub UI

permissions:
  contents: write # needed to push the refreshed signal back to the repo

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements-ai-news.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-ai-news.txt

      # No GEMINI/RESEND secrets: --collect-only does no Gemini and sends no email.
      - name: Collect the week's signal
        working-directory: scripts
        run: |
          mkdir -p ai_news/data
          python -m ai_news.digest --collect-only \
            --json-out ai_news/data/signal-latest.json \
            > ai_news/data/signal-latest.txt

      - name: Commit the refreshed signal
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/ai_news/data/signal-latest.json scripts/ai_news/data/signal-latest.txt
          if git diff --cached --quiet; then
            echo "No signal change; nothing to commit."
          else
            # [skip ci] so this push does not re-trigger Actions.
            git commit -m "chore(signal): refresh weekly collector signal [skip ci]"
            git push
          fi
