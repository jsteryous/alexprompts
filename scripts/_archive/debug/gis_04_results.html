        function bindTextboxHighlightEvent() {

            $('input[type=text]').focus(function () {
                $(this).css("border", "solid 1px #666");
            });

            $('input[type=text], textarea').blur(function () {
                $(this).css("border", "solid 1px #B1B0B2");
            });
        }

        //Filters user input, allows only numbers and select other keys
        function isLegalInput() {
            // Allow only delete (46) , backspace (8), left arrow (37), right arrow (39), enter (13), tab (9), spacebar  
            if (event.keyCode == 46 || event.keyCode == 8 || event.keyCode == 37 || event.keyCode == 39 || event.keyCode == 13 || event.keyCode == 9 || event.keyCode == 32) {
                return true;
            }
            else if ((event.ctrlKey) && (event.keyCode == 67 || event.keyCode == 86 || event.keyCode == 88)) {
                return true;
            }
            else {
                // Ensure that it is a number and stop the keypress
                if ((event.keyCode < 48 || event.keyCode > 57) && (event.keyCode < 96 || event.keyCode > 105)) {
                    return false;
                }
            }
        }

        function isAlphaNumeric() {
            if (event.keyCode == 46 || event.keyCode == 8 || event.keyCode == 37 || event.keyCode == 39 || event.keyCode == 13 || event.keyCode == 9 || event.keyCode == 32) {
                return true;
            }
            if (event.keyCode == 32)
                return true;
            if (48 <= event.keyCode && event.keyCode <= 57)
                return true;
            if (65 <= event.keyCode && event.keyCode <= 90)
                return true;
            if (96 <= event.keyCode && event.keyCode <= 122)
                return true;
            return false;

        }

        //Filters user input, allows only numbers and select other keys
        function isLegalZipInput() {

            // Allow only delete (46) , backspace (8), left arrow (37), right arrow (39), enter (13), tab (9), spacebar  
            if (event.keyCode == 46 || event.keyCode == 8 || event.keyCode == 37 || event.keyCode == 39 || event.keyCode == 13 || event.keyCode == 9) {
                return true;
            }
            else {
                // Ensure that it is a number and stop the keypress
                return /^\d/.test(String.fromCharCode(event.keyCode)) && !event.shiftKey;
            }
        }
