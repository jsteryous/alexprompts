		var	browserSupportsEnhancedUI = true;
		
		function checkBroswerSupport() {
			if (! supportsCanvas()) {
				browserSupportsEnhancedUI = false;
			}
			try {
				setBrowserSupportInSession(browserSupportsEnhancedUI);
			} catch (err) {
				window.frames["bodyframe"].location = "home.do";
			}		
		}	
		
   		function setBrowserSupportInSession(isOn) {
		    $.ajax({
			    url: "/countyweb/user/setEnhancedUI.do",
			    type: "POST",
			    dataType: "json",
			    data: {enhancedUI: isOn}
			}).always(function () {
				window.frames["bodyframe"].location = "home.do";
			});
		}		

		var			menuheight = 22;
		var			footerheight = 48;
		var			forceLogout = true;

		function handleResize () {

		    var     height, width;

			if (isMozillaClient ()) {
				height = window.innerHeight - 15;
				width = window.innerWidth - 15;
			}
			else {
		        height = window.document.body.clientHeight;
		        width = window.document.body.clientWidth;
		        
		        if (isIE9() || isIE10Plus()) {
		        	width = width - 5;
		        	height = height - 10;
				}
		    }

		    if (height < 180)
		    	height = 400;	// too small for anything useful - I guess we'll scroll

	    	// get height of header - image height
	    	var		logoheight = document.getElementById ("logodiv").scrollHeight;

			document.getElementById ("menudiv").style.top = logoheight;
	        document.getElementById ("corediv").style.top = logoheight + menuheight;
	        document.getElementById ("queuediv").style.top = logoheight + menuheight;
	        document.getElementById ("corediv").style.height = height - (logoheight + menuheight + footerheight + (supportsCanvas() ? 0 : 10));
	        document.getElementById ("queuediv").style.height = height - (logoheight + menuheight + footerheight + (supportsCanvas() ? 0 : 10));
	        document.getElementById ("footerdiv").style.top = (logoheight + menuheight) + (height - (logoheight + menuheight + footerheight + (supportsCanvas() ? 0 : 10)));

			if (width <= 1024)
				width = 1024;

			document.getElementById ("logodiv").style.width = width;
			document.getElementById ("menudiv").style.width = width;
			document.getElementById ("corediv").style.width = width - 10;
			document.getElementById ("queuediv").style.width = width - 10;
			document.getElementById ("footerdiv").style.width = width - 10;

			document.getElementById ("disablediv").style.width = width;
//			document.getElementById ("disablediv").style.height = height;



		    document.getElementById ("progress").style.top = Math.max (0, (height / 2) - 110);
		    document.getElementById ("progress").style.left = Math.max (0, (width / 2) - (400/2));

		    document.getElementById ("progressfrm").style.top = Math.max (0, (height / 2) - 110);
		    document.getElementById ("progressfrm").style.left = Math.max (0, (width / 2) - (400/2));

            if (document.getElementById ("dialog").style.width != 0)
                document.getElementById ("dialog").style.top = Math.max (0, (height / 2) - (parseInt(document.getElementById ("dialog").style.width)/2));
             
             if (document.getElementById ("dialog").style.height != 0)
                document.getElementById ("dialog").style.left = Math.max (0, (width / 2) - (parseInt(document.getElementById ("dialog").style.height)/2));
		}

		function handleOnLoad () {
			checkBroswerSupport();
			setFooter ();
			handleResize ();
			showNotification ();

			document.getElementById ("logodiv").style.visibility = "visible";
			document.getElementById ("menudiv").style.visibility = "visible";
			document.getElementById ("corediv").style.visibility = "visible";
			document.getElementById ("footerdiv").style.visibility = "visible";



			window.frames["bodyframe"].focus();
		}

			showHelpWindow ("help/Greenville/" + target, true);

		function showHelpWindow (target) {

			//src = "/countyweb/help/CountyFusionTutorials.pdf#" + target;
			if (arguments.length > 1 && arguments[1] == true)
				src = target;
			else
				src = "help/" + target;

			getScreenCenter (900, 700);
		    helpWnd = window.open ("/countyweb/blank.jsp", "helpwnd", "left=" + centerx + ",top=" + centery + ",screenX=" + centerx + ",screenY=" + centery + ",width=900,height=700,toolbar=0,location=0,directories=0,status=0,menubar=0,scrollbars=1,resizable=1");
		    helpWnd.location = src;
		    helpWnd.focus ();
		}

		function showDisclaimer () {

			src = "disclaimer.do?showaccept=false";

			getScreenCenter (900, 700);
		    disclaimerWnd = window.open ("/countyweb/blank.jsp", "helpwnd", "left=" + centerx + ",top=" + centery + ",screenX=" + centerx + ",screenY=" + centery + ",width=900,height=700,toolbar=0,location=0,directories=0,status=0,menubar=0,scrollbars=1,resizable=1");
		    disclaimerWnd.location = src;
		    disclaimerWnd.focus ();
		}

		function openWindow (target) {

			//src = "/countyweb/help/CountyFusionTutorials.pdf#" + target;
			src = target;

			getScreenCenter (900, 700);
		    helpWnd = window.open ("/countyweb/blank.jsp", "helpwnd", "left=" + centerx + ",top=" + centery + ",screenX=" + centerx + ",screenY=" + centery + ",width=900,height=700,toolbar=0,location=0,directories=0,status=0,menubar=0,scrollbars=1,resizable=1");
		    helpWnd.location = src;
		    helpWnd.focus ();
		}

		function showMailTo (src) {


				window.location.href = "mailto:tnanney@greenvillecounty.org";

		}
		
		function showSupport () {

			src = "/countyweb/support/supportForm.jsp";
			
			var mainImg = document.getElementById("mainImage"); 
			var width = mainImg.clientWidth + 20;
			
					
			if (width < 600)
				width = 600;					

			getScreenCenter (width, 800);
		    supportwnd = window.open (src, "supportwnd", "left=" + centerx + ",top=" + centery + ",screenX=" + centerx + ",screenY=" + centery + ",width=" + width + ",height=800,toolbar=0,location=0,directories=0,status=0,menubar=0,scrollbars=1,resizable=1");
		    supportwnd.focus ();
		}
		
		function openPrintQueue () {

			document.getElementById ("corediv").style.visibility = "hidden";
			document.getElementById ("queuediv").style.visibility = "visible";
		}

		function hidePrintQueue () {

			document.getElementById ("corediv").style.visibility = "visible";
			document.getElementById ("queuediv").style.visibility = "hidden";
			
			if (top.frames["bodyframe"].updatePrintQueueState)
				top.frames["bodyframe"].updatePrintQueueState();
		}

		function disableApp () {
			
			document.getElementById ("disablediv").style.visibility = "visible";
		}

		function enableApp () {
			
			document.getElementById ("disablediv").style.visibility = "hidden";
		}

		function showSystemStatus () {
			
			initDialog();

			if (top.frames && top.frames["bodyframe"] && top.frames["bodyframe"].startPrint)
				top.frames["bodyframe"].startPrint();
			
			showDialog(true, "notificationBase.jsp?type=systemstatus&width=650", "System Status", 650, 275);
		}
		
		function showNotification () {
		
			
		}
		
		function setFooter () {


				window.frames["footerframe"].location = "/countyweb/footer.do?cmd=EscrowCombo";

		}

		function updateFooter () {
			if (arguments.length > 0)
				window.frames["footerframe"].location = "/countyweb/footer.do?cmd=" + arguments[0];
			else
				window.frames["footerframe"].location = "/countyweb/footer.do?cmd=EscrowCombo";
		}
		
		function checkConcurrentDownload() {
			var messageObj;
			
			$.ajax({
			    url: "/countyweb/search/checkConcurrentDownload.do",
			    type: "GET",
			    dataType: "json",
			    success: function(data) {
			    	if (data.downloadActive) {
						messageObj = confirm("A download is currently in progress and will be canceled if you log out. Would you like to continue logging out?");
						
						if (messageObj) {
							checkPrintQueue();
						} else {
							return false;
						}
					} else {
						checkPrintQueue();
					}
				},
				error: function() {
					checkPrintQueue();
				}
			});
		}
		
		function checkPrintQueue() {
			var messageObj;
			
		    $.ajax({
			    url: "/countyweb/print/checkPrintQueue.do",
			    type: "POST",
			    dataType: "json",
			    success: function(data) {
					if (data.hasQueue) {
						messageObj = confirm("The Print Queue contains documents waiting to be printed and will be lost if you log out. Would you like to continue logging out?");
						
						if (messageObj) {
							forceLogout = false;
							window.location.href = "/countyweb/logout.do";
						} else {
							return false;
						}
					} else {
						forceLogout = false;
						window.location.href = "/countyweb/logout.do";
					}
				},
			    error: function() {
					forceLogout = false;
					window.location.href = "/countyweb/logout.do";
			    }
			});
		}
		
		function handleOnUnLoad () {
			if (forceLogout)
				try {
					window.location.href = "/countyweb/logout.do";
				}
				catch (err) {}			
		}	

		window.onresize=handleResize;
