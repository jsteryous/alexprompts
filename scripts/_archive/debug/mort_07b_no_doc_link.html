		function executePrint (cmd, data, printer) {
			if (document.getElementById("documentContent").style.display == "none") {
				return false;
			}

			var		addrdata = "";
			if(arguments.length >= 4)
				addrdata = arguments[3];
			var		forcePrintWM = null;
			if(arguments.length >= 5)
				forcePrintWM = arguments[4];
				
			document.getElementById("documentFrame").contentWindow.executeCommand (cmd, data, printer, addrdata, forcePrintWM);
            if (typeof document.getElementById("documentFrame").contentWindow.clearAllSelectedPages !== "undefined")
				document.getElementById("documentFrame").contentWindow.clearAllSelectedPages ();			
			
			return true;
		}

		function executePrintResults (cmd, data, printer, printAll) {
		
			if (printAll && window.frames["resultFrame"].frames["resultListFrame"].parent.searchResultObj.resultsCount > 1500) {
				alert ("Total item count exceeds the maximum Print All size of 1500 items.\nTo Print All items, please modify the Search Criteria and search again.");
		   		return false;
		   	}
		
			getScreenCenter(1000, 600);
			var command = "viewresults";
			if (printAll)
				command = "viewallresults";
            var goUrl = "/countyweb/search/searchPrintPaid.do?cmd=" + command + "&printdata=" + data;
            var message = "Generating Search Results, please wait...";
			var	wnd = window.open ("/countyweb/postServletProgressMessage.jsp?message=" + message + "&src=" + escape(goUrl), "printResults_" + (new Date().getTime()), "left=" + centerx + ",top=" + centery + ",screenX=" + centerx + ",screenY=" + centery + ",width=1000,height=600,toolbar=0,location=0,directories=0,status=0,menubar=1,scrollbars=1,resizable=1");
			wnd.focus();
			return true;
		}

		function hasPrintResultsPermission() {
			// First check permissions
			var restTypes = "";
			if(window.frames[getSearchFrame()]) {
				var searchType = "";

					searchType = window.frames[getSearchFrame()].getSelectedSearchTypeValue();
					
				var types = restTypes.split("|");
				for(var i=0; i<types.length; i++) {
					if(searchType == types[i]) {
						return false;
					}
				}
			}
			return true;
		}

		function showPrintOptions () {
			var disp = document.getElementById("documentFrame").contentWindow.imageDisplayed ();
			if (disp == -1) {
				alert ("Unable to print image.  User not authorized to view or print images.");
				return;
			}
			else if (disp == 0) {
				alert ("To print image, image must first be displayed.");
				return;
			}
			
			if (false && false) {
				var messageObj;
			    $.ajax({
				    url: "/countyweb/print/getPrintServiceStatus.do",
				    type: "POST",
				    dataType: "json",
				    success: function (data) {
				    	if (! data.isAlive) {
							if (typeof document.getElementById("documentFrame").contentWindow.showImageViewer == "function") {
								document.getElementById("documentFrame").contentWindow.showImageViewer(false);
							}				    	
							messageObj = $.messager.confirm({
								closable: false,
								width: 420,
    							height: 180,
								title: "Print Service",
   								msg: "Print Service does not appear to be running.<br><br><br>Would you like to continue and create a print job that will print once the Print Service is running or cancel this print job?",
   								ok: "Continue",
   								fn: function (retVal) {
									if (typeof document.getElementById("documentFrame").contentWindow.showImageViewer == "function") {
										document.getElementById("documentFrame").contentWindow.showImageViewer(true);
									}				    	
   									if (retVal) {
   										showPrintOptionsEx();
   									}
   									else {
					     				return false;
					     			}
					     		}
					    	});
						}
						else
							showPrintOptionsEx();
					}
				});
				return;
			}
			showPrintOptionsEx();
		}
		
		function showPrintOptionsEx () {

		function showDownloadOptions() {
			var messageObj;
			var isPrint = false;
		   	if (arguments.length > 0)
	    		isPrint = arguments[0];
			
			$.ajax({
			    url: "/countyweb/search/checkConcurrentDownload.do",
			    type: "GET",
			    dataType: "json",
			    success: function(data) {
			    	if (data.downloadActive) {
						messageObj = $.messager.alert({
							title: "Download In Progress",
							msg: "A previous download is currently in progress. Please wait for that download to finish before starting a new one.",
							icon: "error",
							height: 'auto',
							width: 550
						});
					} else {
						continueDownloadOptions(isPrint);
					}
				},
				error: function() {
					continueDownloadOptions(isPrint);
				}
			});
		}

			showPrint(true, src, "Download Options", 400, height);

    		var searchElem 	= document.getElementById(getSearchDiv ());
    		var resultsElem = document.getElementById("resultsContent");
    		var resultsFrm = document.getElementById("resultFrame");
    		var dataElem 	= document.getElementById("documentContent");
    		var	navElem		= document.getElementById("criterianavdiv");

	    	if (window.frames["documentFrame"] != null && document.getElementById("documentFrame").contentWindow.isPrinting && document.getElementById("documentFrame").contentWindow.isPrinting()) {
    			alert ("Printing in progress, unable to complete request until print job is complete.");
    			return;
    		}

    		if(activeSearchPanel == "eVerify") {
    			searchElem.style.visibility 	= "visible";
    			resultsFrm.style.visibility 	= "hidden";
    			resultsElem.style.zIndex		= -1;
    			resultsElem.style.visibility 	= "hidden";
    			dataElem.style.display 			= "none";
    			navElem.style.visibility 		= "visible";
    		}
    		else if(activeSearchPanel == "search") {
    			searchElem.style.visibility 	= "visible";
    			resultsFrm.style.visibility 	= "hidden";
    			resultsElem.style.zIndex		= -1;
    			resultsElem.style.visibility 	= "hidden";
    			dataElem.style.display 			= "none";
    			navElem.style.visibility 		= "visible";
    			if(resultFrame.docInfoLoading) {
    				showProgressBar(true, null, false);
    			}
    			updateHeader("search.advanced");
    			//updateHeader("search.advanced");
    			updateSearchTimer ("stop");

    			if (window.frames["resultFrame"].isResults) {
	    			if (window.frames["resultFrame"].isResults())
    					updateNavbar ("search.critresults");
	    			else
    					updateNavbar ("");
    			}
    			else {
    				updateNavbar ("");
    			}
    		}
    		else if(activeSearchPanel == "results") {
    			if (openModal) {
					try {
						$(".panel.window").show();
						$(".window-mask").show();
						$(".window-shadow").show();
					}
					catch (e) {}
	    		}
    		
    			resultsFrm.style.visibility 	= "visible";


    			resultsElem.style.visibility 	= "visible";
    			resultsElem.style.zIndex		= 1;
    			dataElem.style.display 			= "none";
    			searchElem.style.visibility 	= "hidden";
    			navElem.style.visibility 		= "hidden";
    			if(resultFrame.docInfoLoading) {
    				showProgressBar(true,null, false);
    			}
    			updateHeader ("search.results");


					if(hasPrintResultsPermission()) {
	    				updateNavbar ("search.results");
	    			}
	    			else {
	    				updateNavbar ("search.results.noprint");
	    			}

   				updateSearchTimer ("start");
   				updatePrintQueueState();
    		}
    		else if(activeSearchPanel == "info") {
    			dataElem.style.display 			= "block";
    			searchElem.style.visibility 	= "hidden";
    			resultsFrm.style.visibility 	= "hidden";
    			resultsElem.zIndex				= -1;
    			resultsElem.style.visibility 	= "hidden";
    			navElem.style.visibility = "hidden";
    			if(resultFrame.docInfoLoading) {
    				var msg = "Loading Document Details...";

    				var modulePath = getSearchModuleUIPath();
    				if(modulePath.length != "" &&  ".casefile".indexOf(modulePath) != -1) {
    					msg = "Loading Case File Details...";
    				}

    				showProgressBar(true, msg, false);
    			}
    			updateHeader ("search.details");
    			
    				updateNavbar ("search.details.external");
    			
    		}
    	}

	    function downloadDocImage(instrId) {
			var pdf = true;
			
	    	if (arguments.length > 1) {
	    		pdf = arguments[1];
	    	}

	    	var pages = "";
			
	    	if (arguments.length > 2) {
	    		pages = arguments[2];
	    	}

	    	var printopt = "printall";
			
	    	if (arguments.length > 3) {
	    		printopt = arguments[3];
	    	}

	    	var isPreview = "false";
			
	    	if (arguments.length > 4 && arguments[4] != undefined) {
	    		isPreview = arguments[4];
	    	}
			
			var messageObj;
			
			$.ajax({
			    url: "/countyweb/search/checkConcurrentDownload.do",
			    type: "GET",
			    dataType: "json",
			    success: function(data) {
			    	if (data.downloadActive) {
						messageObj = $.messager.alert({
							title: "Download In Progress",
							msg: "A previous download is currently in progress. Please wait for that download to finish before starting a new one.",
							icon: "error",
							height: 'auto',
							width: 550
						});
					} else {
						continueDownloadDocImage(instrId, pdf, pages, printopt, isPreview);
					}
				},
				error: function() {
					continueDownloadDocImage(instrId, pdf, pages, printopt, isPreview);
				}
			});
		}
		    	
	    function continueDownloadDocImage(instrId, pdf, pages, printopt, isPreview) {
			if (instrId == "")
	    		instrId = document.getElementById("documentFrame").contentWindow.getInstrumentId ();
	    	
			var	redacted = isViewerImageRedacted();
			var uuid = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx".replace(/[x]/g, function(c) {
    			var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
    			return v.toString(16);
  			});

			var messageObj;
            
		    $.ajax({
			    url: "/countyweb/search/startLongDownloadWatch.do",
			    type: "POST",
			    dataType: "json",
			    data: {id: uuid},
			    success: function(data) {
			    	if (data.showMessage) {
						messageObj = $.messager.alert({
							title: "Processing Download",
							msg: "This file is being processed for downloading. Depending on the size of the file, processing may take up to several minutes. You may continue working while the file processes. Please do not log out until the download is complete.",
							icon: "info",
							height: 'auto',
							width: 550
						});
					}
				}
			});

            var goUrl = "/countyweb/download/downloadImages.do?cmd=download&instrId=" + 
				instrId + "&pdfformat=" + pdf + "&printopt=" + printopt + "&pages=" + pages + "&redacted=" + redacted + "&isPreview=" + isPreview + "&uuid=" + uuid;
				
			if (printopt == "printvisible" && document.getElementById("documentFrame").contentWindow.getPrintVisibleData) {
				var printVisible = document.getElementById("documentFrame").contentWindow.getPrintVisibleData();
				if (printVisible != null)
					goUrl += "&printVisible=" + printVisible;	
			}
				
			if (false && pdf) {
				if (isEdge()) {
					getScreenCenter(800, 865);
					var	wnd = window.open (goUrl, "PrintPDF", "left=" + centerx + ",top=" + centery + ",screenX=" + centerx + ",screenY=" + centery + ",width=800,height=865,toolbar=0,location=0,directories=0,status=0,menubar=0,scrollbars=1,resizable=1");
					wnd.focus();
				}
				else
					jqShowPopup("print/showPDF.jsp?pdf=" + encodeURIComponent(goUrl), 800, 865, "Save/Print PDF", false, true, true, false);
				
			} else {
				window.frames["dlframe"].location = goUrl;
			}
            if (typeof document.getElementById("documentFrame").contentWindow.clearAllSelectedPages !== "undefined")
				document.getElementById("documentFrame").contentWindow.clearAllSelectedPages ();
		}

		var		topoffset = 40;

		function setTopOffset (offset, dbl_nav) {

			topoffset = offset;

			if (dbl_nav) {
				document.getElementById ("resultsnavdiv").style.height = 64;
			}
			else {
				document.getElementById ("resultsnavdiv").style.height = 32;
			}

	        document.getElementById ("searchContent").style.top = topoffset - 10;
	        document.getElementById ("dynSearchContent").style.top = topoffset - 10;
	        document.getElementById ("resultsContent").style.top = topoffset;
	        document.getElementById ("documentContent").style.top = topoffset;
	        document.getElementById ("progressContent").style.top = topoffset;

			handleResize ();
		}

		function handleResize () {
		
			if (isIOS && resizeCount > 4)
				return;
		
			if (!gridIsReady)
				return;
			
		    var height;
		    var	width;
			if (isMozillaClient ()) {
				height = window.innerHeight;
				width = window.innerWidth;
			}
			else {
		        height = window.document.body.clientHeight;
		        width = window.document.body.clientWidth;
		    }

		    if (height > topoffset + 10) {
		        document.getElementById ("searchContent").style.height = height - topoffset - 10;
		        document.getElementById ("dynSearchContent").style.height = height - topoffset - 10;
		        document.getElementById ("resultsContent").style.height = height - topoffset - 10;
		        document.getElementById ("documentContent").style.height = height - topoffset - 10;
		        document.getElementById ("progressContent").style.height = height - topoffset - 10;
		    }
		    else {
		        document.getElementById ("searchContent").style.height = topoffset;
		        document.getElementById ("dynSearchContent").style.height = topoffset;
		        document.getElementById ("resultsContent").style.height = topoffset;
		        document.getElementById ("documentContent").style.height = topoffset;
