			document.DocInfoForm.nextcmd.value = nextCmd;

			document.DocInfoForm.target = "";

			if (baseNameFC != "") {

						addName (baseNameFC, baseNameTarget);
					else
						updateName (baseNameFC, baseNameTarget);

					jqClearNameFields (baseNameFC);
				}
				else {
					if (currRowEdit == -1)
						addParcel (baseNameFC, baseNameTarget);
					else
						updateParcel (baseNameFC, baseNameTarget);

					jqClearParcelFields (baseNameFC);
				}

				return false;
			}

				executeCommand('LookupParcel', false, '');

		function handleResize () {
			if (!gridIsReady)

		    var		width;

			if (isMozillaClient ()) {
				height = window.innerHeight;
				width = window.innerWidth;
			}
			else {

		        width = window.document.body.clientWidth;

		    else {

		    }
		    
			if (document.getElementById ("tabbar") != null) {
