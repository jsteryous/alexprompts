      globalThis.injectScript = (src) => {
        if (!globalThis.injectedScripts) {
          globalThis.injectedScripts = new Set();
        }

        if (globalThis.injectedScripts.has(src)) {
          return Promise.resolve();
        }

        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.addEventListener("load", () => {
            globalThis.injectedScripts.add(src);
            resolve();
          });
          script.addEventListener("error", e => reject(e.error));
          document.head.appendChild(script);
        });
      };
    </script>

    <script>
      function openLiveChat() {
        const params = new URLSearchParams();

        params.append("d", "37437"); // department number
        params.append("lhnid", "25615"); // livehelp account number
        params.append("zzwindow", "36182"); // window number?
        params.append("pcv", JSON.stringify({ "-website": window.location.href }));
        params.append("time", "4/6/2026 7:37:22PM");

        const url = "https://www.livehelpnow.net/lhn/lcv.aspx?" + params;
        const wWidth = 500;
        const wHeight = 500;
        const left = window.screen.width / 2 - wWidth / 2;
        const top = window.screen.height / 2 - wHeight / 2;

        const popupOptions = [
          "resizable",
          "scrollbars",
          `width={wWidth}`,
          `height={wHeight}`,
          `top={top}`,
          `left={left}`,
        ].join(",");

        window.open(url, "Live Chat Support", popupOptions).focus();
      }
    </script>
