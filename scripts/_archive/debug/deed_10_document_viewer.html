    /** Called when document has loaded. (onloadAction see transAddDoc.jsp)

    **/
    function documentLoaded() {

    /** Navigate documents.
     *	Calls resultListFrame. SearchResultsView.jsp > SearchResultList.jsp
    **/
    function navToDocument(navDirection) {

    	if (isPrinting ()) {
    		alert ("Printing in progress, unable to complete request until print job is complete.");
    		return;
    	}

    	var	show_details = true;
		if (document.getElementById ("docDetails").style.display == "none") {
				show_details = false;
		}
    	if(parent.frames["resultFrame"]) { // FOR INST SEARCH
    		parent.frames["resultFrame"].frames["resultListFrame"].navigateToDocument(navDirection, show_details);
    	}
    	else if (parent.frames["instListFrame"]) { // FOR INST LIST DISPLAY IN CASEFILE
    		parent.frames["instListFrame"].frames["resultListFrame"].navigateToDocument(navDirection, show_details);
    	}
    	else {
    		alert("Error loading document. Result list may be invalid. Try search again." );
    	}
    }

    function processKey (key, ctrl, alt) {

    	if (alt && key == 80)
    		navToDocument('prev');

    	if (alt && key == 78)
    		navToDocument('next');
    }

    /** Load doc from history.
     *	Calls resultListFrame. SearchResultsView.jsp > SearchResultList.jsp
    **/
    function loadDocFromHistory() {

    	if (isPrinting ()) {
    		alert ("Printing in progress, unable to complete request until print job is complete.");
    		return;
    	}

   		var docIndex = $("#navHistory").combobox("getValue");
		var show_details = true;
		if (document.getElementById("docDetails").style.display == "none") {
			show_details = false;
		}
    	if(parent.frames["resultFrame"]) {
    		parent.frames["resultFrame"].loadDocument(docHistInfo[docIndex], show_details);
    	}
    	else if (parent.frames["instListFrame"]) {
    		parent.frames["instListFrame"].loadDocument(docHistInfo[docIndex], show_details);
    	}
    	else {
    		alert("Error loading document. Result list may be invalid. Try search again." );
    	}
    }

	function resizeMe () {
	    var height;
	    var width;
		if (isMozillaClient ()) {
			height = window.innerHeight;
			width = window.innerWidth;
		}
		else {
	        height = window.document.body.clientHeight;
	        width = window.document.body.clientWidth;
	    }
	    
	    if (height > 20) {
	        document.getElementById ("docInfoHolder").style.height = height - 10;
	        document.getElementById ("docInfoFrame").height = height - 52;
	    }
	    else {
	        document.getElementById ("docInfoHolder").style.height = 20;
	        document.getElementById ("docInfoFrame").height = 20;
		}
		
		var	height = height - 10;	
		var	width = width - 40;
		$("#main").layout("resize", {
			height:height,
			width:width
		});
		
		try {
			var mainCenterPanel = $("#main").layout("panel", "center");
			if (document.getElementById("docImgViewFrame") != null) {
				document.getElementById("docImgViewFrame").style.height = mainCenterPanel.panel("panel").outerHeight();
			}
		} catch(e) {}
	}

    function getPanelState(){
    
       	var panelState = {};
		var requestData = new Array();
		
		var westPanel = $("#main").layout("panel", "west");
       	if (westPanel.length) {
          	var state = {};
            state.panel = "west";
            state.width = westPanel.panel("panel").outerWidth();
            state.height = westPanel.panel("panel").outerHeight();
            state.collapsed = false;
           	requestData.push(state);
      	}
      	
        panelState.state = requestData;
        return panelState;
	}
	
	function saveSearchDetailsState () {
	
		var state = getPanelState();
		
	   	$.ajax({
